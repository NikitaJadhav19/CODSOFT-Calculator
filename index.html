<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="calculator" aria-label="Calculator">
    <div class="display" role="status" aria-live="polite">
      <div id="expression" class="expression"></div>
      <div id="result" class="result">0</div>
    </div>

    <div class="buttons" role="group" aria-label="Calculator buttons">
      <button class="btn btn-func" data-action="clear">C</button>
      <button class="btn btn-func" data-action="back">⌫</button>
      <button class="btn btn-func" data-action="operator" data-value="/">÷</button>
      <button class="btn btn-op" data-action="operator" data-value="*">×</button>

      <button class="btn" data-action="digit" data-value="7">7</button>
      <button class="btn" data-action="digit" data-value="8">8</button>
      <button class="btn" data-action="digit" data-value="9">9</button>
      <button class="btn btn-op" data-action="operator" data-value="-">−</button>

      <button class="btn" data-action="digit" data-value="4">4</button>
      <button class="btn" data-action="digit" data-value="5">5</button>
      <button class="btn" data-action="digit" data-value="6">6</button>
      <button class="btn btn-op" data-action="operator" data-value="+">+</button>

      <button class="btn" data-action="digit" data-value="1">1</button>
      <button class="btn" data-action="digit" data-value="2">2</button>
      <button class="btn" data-action="digit" data-value="3">3</button>
      <button class="btn btn-equals" data-action="equals">=</button>

      <button class="btn btn-zero" data-action="digit" data-value="0">0</button>
      <button class="btn" data-action="dot" data-value=".">.</button>
      <button class="btn btn-spacer" disabled aria-hidden="true"></button>
      <button class="btn btn-spacer" disabled aria-hidden="true"></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
